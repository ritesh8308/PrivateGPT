server:
  env_name: prod
  port: 8000

llm:
  mode: gemini

embedding:
  mode: gemini

gemini:
  api_key: ${GOOGLE_API_KEY}
  # In 2026, 'gemini-1.0-pro' is the only stable legacy alias left
  model: models/gemini-1.0-pro
  embedding_model: models/embedding-001

vectorstore:
  database: qdrant

qdrant:
  path: local_data/qdrant

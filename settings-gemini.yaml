server:
  env_name: prod
  port: 8000

llm:
  mode: gemini

embedding:
  mode: gemini

gemini:
  api_key: ${GOOGLE_API_KEY}
  # Use the current lightning-fast model
  model: gemini-3.1-flash-lite
  # Use the current standard embedding model
  embedding_model: text-embedding-005



vectorstore:
  database: qdrant

qdrant:
  path: local_data/qdrant

server:
  env_name: prod
  port: 8000

llm:
  mode: gemini

embedding:
  mode: gemini

gemini:
  api_key: ${GOOGLE_API_KEY}
  # Change this line:
  model: gemini-1.5-flash
  # Change this line too:
  embedding_model: text-embedding-004


vectorstore:
  database: qdrant

qdrant:
  path: local_data/qdrant

server:
  env_name: prod
  port: 8000

llm:
  mode: gemini

embedding:
  mode: gemini

gemini:
  api_key: ${GOOGLE_API_KEY}
  # This is the "Universal" alias that works across all v1/v1beta versions
  model: gemini-pro
  embedding_model: text-embedding-004

vectorstore:
  database: qdrant

qdrant:
  path: local_data/qdrant

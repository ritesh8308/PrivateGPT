server:
  env_name: prod
  port: 8000
  cors:
    allow_origins: ["*"]
    allow_methods: ["*"]
    allow_credentials: true

llm:
  mode: gemini

tokenizer: null

embedding:
  mode: gemini


gemini:
  api_key: ${GOOGLE_API_KEY}
  # Use 'gemini-1.5-flash' first to verify it works (it's faster/easier to access)
  model: models/gemini-1.5-flash
  embedding_model: models/text-embedding-004
  
vectorstore:
  database: qdrant

qdrant:
  path: local_data/qdrant
